---
# defaults/main.yml — netops_update role

# Target OS image filename to be activated on the device.
netops_update_image: ""

# Where the image is staged on the device (vendor-specific path).
netops_update_image_dest: "flash:/"

# Source URL or local path for the image file (leave blank to skip transfer).
netops_update_image_src: ""

# When true the role only validates pre/post health — no image is pushed.
netops_update_dry_run: true

# Seconds to wait after reload before re-checking health.
netops_update_reload_wait: 300

# Health checks to run before and after the upgrade.
netops_update_pre_checks: true
netops_update_post_checks: true

# CPU/memory thresholds used during health validation.
netops_update_cpu_critical: 90
netops_update_memory_critical: 90

# When true, roll back to the previous image if post-checks fail.
netops_update_rollback_on_failure: true

# Connection parameters.
netops_update_username: "{{ ansible_user | default(omit) }}"
netops_update_password: "{{ ansible_password | default(omit) }}"
netops_update_port: "{{ ansible_port | default(22) }}"
netops_update_vendor: "{{ ansible_network_os | default('cisco_ios') }}"
