---
# defaults/main.yml — netops_health role

# Which checks to run.  Set any to false to skip that check entirely.
netops_health_check_cpu: true
netops_health_check_memory: true
netops_health_check_interfaces: true
netops_health_check_bgp: true
netops_health_check_ospf: false

# Thresholds — if a device exceeds these the task is marked CRITICAL.
netops_health_cpu_critical: 90      # percent
netops_health_memory_critical: 90   # percent

# When true the play fails immediately upon the first CRITICAL finding.
netops_health_fail_on_critical: true

# Where to write the JSON health report (empty = do not write).
netops_health_report_path: ""

# Connection parameters.
netops_health_username: "{{ ansible_user | default(omit) }}"
netops_health_password: "{{ ansible_password | default(omit) }}"
netops_health_port: "{{ ansible_port | default(22) }}"
netops_health_vendor: "{{ ansible_network_os | default('cisco_ios') }}"
