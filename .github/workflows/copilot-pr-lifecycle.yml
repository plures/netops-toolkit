name: Copilot PR Lifecycle

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'Copilot' ||
      github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
    steps:
      - name: Mark ready for review
        if: github.event.action == 'opened' && github.event.pull_request.draft == true
        run: gh pr ready ${{ github.event.pull_request.number }} -R ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Request review
        if: github.event.action == 'opened' || github.event.action == 'ready_for_review'
        run: |
          gh pr edit ${{ github.event.pull_request.number }} -R ${{ github.repository }} \
            --add-reviewer kayodebristol || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge on approval
        if: >-
          github.event_name == 'pull_request_review' &&
          github.event.review.state == 'approved'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} -R ${{ github.repository }} \
            --squash --auto --delete-branch || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  queue-advance:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Assign next issue to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if Copilot already has an open issue
            const issues = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100
            });
            const copilotIssues = issues.data.filter(i =>
              !i.pull_request &&
              i.assignees.some(a => a.login === 'Copilot')
            );
            if (copilotIssues.length > 0) {
              console.log(`Copilot already assigned to #${copilotIssues[0].number}, skipping`);
              return;
            }

            // Find milestones sorted by title
            const milestones = await github.rest.issues.listMilestones({
              owner, repo, state: 'open', sort: 'title', direction: 'asc'
            });

            // Find first unassigned issue in earliest milestone
            for (const ms of milestones.data) {
              const msIssues = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', milestone: ms.number,
                sort: 'created', direction: 'asc', per_page: 20
              });
              const next = msIssues.data.find(i =>
                !i.pull_request &&
                !i.assignees.some(a => a.login === 'Copilot')
              );
              if (next) {
                // Assign via GraphQL (triggers Copilot)
                const botId = 'BOT_kgDOC9w8XQ';
                await github.graphql(`
                  mutation($id: ID!, $assignees: [ID!]!) {
                    addAssigneesToAssignable(input: { assignableId: $id, assigneeIds: $assignees }) {
                      clientMutationId
                    }
                  }
                `, { id: next.node_id, assignees: [botId] });

                // Nudge
                await github.rest.issues.createComment({
                  owner, repo, issue_number: next.number,
                  body: '@copilot Please implement this issue.'
                });
                console.log(`Assigned Copilot to #${next.number}: ${next.title}`);
                return;
              }
            }
            console.log('No unassigned milestone issues found');
