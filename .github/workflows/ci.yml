name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,report]"

      - name: Lint (ruff)
        run: python -m ruff check netops/ tests/

      - name: Type check (mypy)
        run: python -m mypy netops/

      - name: Tests (pytest)
        run: python -m pytest tests/ --tb=short -q

      - name: Audit dependencies (pip-audit)
        # CVE-2026-4539: ReDoS in pygments AdlLexer; local-only attack vector,
        # no fix available upstream yet. Ignored until pygments releases a patch.
        run: pip-audit --local --ignore-vuln CVE-2026-4539
