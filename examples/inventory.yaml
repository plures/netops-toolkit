# Example network inventory
# Copy and customize for your environment

defaults:
  username: admin
  transport: ssh

devices:
  core-rtr-01:
    host: 10.0.0.1
    vendor: cisco_ios
    role: core
    site: dc1
    groups: [routers, core, dc1]
    tags:
      environment: production
      managed_by: noc

  core-rtr-02:
    host: 10.0.0.2
    vendor: nokia_sros
    role: core
    site: dc1
    groups: [routers, core, dc1]
    tags:
      environment: production

  dist-sw-01:
    host: 10.0.1.1
    vendor: cisco_ios
    role: distribution
    site: dc1
    groups: [switches, distribution, dc1]
    transport: telnet  # Legacy device
    port: 23

  access-sw-01:
    host: 10.0.2.1
    vendor: cisco_ios
    role: access
    site: office1
    groups: [switches, access, office1]

  # Brocade FastIron/ICX router example
  brocade-rtr-01:
    host: 10.0.3.1
    vendor: brocade_fastiron
    role: core
    site: dc1
    groups: [routers, core, dc1, brocade]
    tags:
      environment: production
      platform: ICX7550

  # Brocade Network OS (VDX) switch example
  brocade-vdx-01:
    host: 10.0.3.2
    vendor: brocade_nos
    role: distribution
    site: dc1
    groups: [switches, distribution, dc1, brocade]
    tags:
      environment: production
      platform: VDX6740

  # Palo Alto Networks firewall example (Active unit)
  paloalto-fw-01:
    host: 10.0.4.1
    vendor: paloalto_panos
    role: edge
    site: dc1
    groups: [firewalls, edge, dc1, paloalto]
    tags:
      environment: production
      platform: PA-3220
      ha_role: active

  # Palo Alto Networks firewall example (Passive/HA peer)
  paloalto-fw-02:
    host: 10.0.4.2
    vendor: paloalto_panos
    role: edge
    site: dc1
    groups: [firewalls, edge, dc1, paloalto]
    tags:
      environment: production
      platform: PA-3220
      ha_role: passive
